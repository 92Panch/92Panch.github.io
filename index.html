<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS3 Images Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="project-container">
        <img src="penguins.jpg" alt="Penguins" class="penguins">
        <div class="photo-title">Penguins</div>
    </div>

    <div class="project-container">
        <div style="height: 200px; display: flex; align-items: center;">
            <div class="field-wrapper">
                <div class="ttt-grid">
                    <!-- Row 1 -->
                    <div class="symbol x-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol x-sym"></div>

                    <!-- Row 2 -->
                    <div class="symbol o-sym"></div>
                    <div style="grid-column: span 9;"></div>
                    <div class="symbol o-sym"></div>

                    <!-- Row 3 -->
                    <div class="symbol o-sym"></div>
                    <div style="grid-column: span 9;"></div>
                    <div class="symbol o-sym"></div>

                    <!-- Row 4 -->
                    <div class="symbol o-sym"></div>
                    <div style="grid-column: span 9;"></div>
                    <div class="symbol o-sym"></div>

                    <!-- Row 5 -->
                    <div class="symbol x-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol o-sym"></div>
                    <div class="symbol x-sym"></div>
                </div>
            </div>
        </div>
        <div class="photo-title">Football Field</div>
    </div>

    <div class="project-container">
        <img src="dinosaur.png" alt="Dino" class="dino">
        <div class="photo-title">Dinosaur</div>
    </div>

    <div class="project-container">
        <div class="seagull-container">
            <img src="seagull.png" alt="Seagull" class="seagull">
        </div>
        <div class="photo-title">Seagull</div>
    </div>

    <div class="project-container">
        <img src="butterfly.jpg" alt="Butterfly" class="butterfly">
        <div class="photo-title">Butterfly</div>
    </div>

    <div class="project-container">
        <div class="theater-box">
            <img src="theater_stage.jpg" alt="Stage" class="theater-img">
            <div class="overlay-gradient"></div>
            <h2>Presenting</h2>
        </div>
        <div class="photo-title">Theater Stage</div>
    </div>

</body>
</html>
