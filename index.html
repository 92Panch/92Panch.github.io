<!DOCTYPE html>
<html>
<head>
    <title>Puzzle</title>
</head>
<style>
    .page-layout {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
    gap: 10px;
    font-family: sans-serif;
}

.info-section, .date-section {
    padding: 20px;
    background: #f0f0f0;
    text-align: center;
}

.puzzle-section {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.flex-container {
    display: flex;
    flex-wrap: wrap;
    width: 900px;
    line-height: 0;
}

.flex-container img {
    width: 300px;
    height: auto;
}

.faulty-piece {
    display: none;
}
</style>
<body>
    <div class="page-layout">
        <section class="info-section">
            <h1>Fish</h1>
        </section>
        <section class="puzzle-section">
            <div class="flex-container">
               <img src="https://github.com/92Panch/92Panch.github.io/blob/main/image/puzzle3_D.jpg?raw=true" alt="piece 1">
                <img src="https://github.com/92Panch/92Panch.github.io/blob/main/image/puzzle3_A.jpg?raw=true" alt="piece 2">
                <img src="https://github.com/92Panch/92Panch.github.io/blob/main/image/puzzle3_G.jpg?raw=true" alt="piece 3">
                <img src="https://github.com/92Panch/92Panch.github.io/blob/main/image/puzzle3_J.jpg?raw=true" alt="piece">
                <img src="https://github.com/92Panch/92Panch.github.io/blob/main/image/puzzle3_B.jpg?raw=true" alt="piece 4">
                <img src="https://github.com/92Panch/92Panch.github.io/blob/main/image/puzzle3_C.jpg?raw=true" alt="piece 5">
                <img src="https://github.com/92Panch/92Panch.github.io/blob/main/image/puzzle3_F.jpg?raw=true" alt="piece 6">
                <img src="https://github.com/92Panch/92Panch.github.io/blob/main/image/puzzle3_I.jpg?raw=true" alt="piece">
                <img src="https://github.com/92Panch/92Panch.github.io/blob/main/image/puzzle3_E.jpg?raw=true" alt="piece 7">
            </div>
        </section>
        <section class="date-section">
            <p>Mykhail Panchenko 11.04.2026</p>
        </section>
    </div>
</body>
</html>
